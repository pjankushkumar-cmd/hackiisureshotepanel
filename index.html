<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ HACKII TRUE DUAL STREAM v7.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #02040a;
            overflow: hidden;
            touch-action: manipulation;
        }
        .font-digital {
            font-family: 'Orbitron', sans-serif;
        }
        /* HACKII Dynamic Rainbow Glow */
        .hackii-glow {
            background: linear-gradient(45deg, #ff0055, #00ffcc, #9900ff, #ff0055);
            background-size: 200% auto;
            animation: moveGlow 4s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
        }
        @keyframes moveGlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        .glass-card {
            background: rgba(10, 15, 30, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .neon-box {
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.15);
        }
        .neon-digit {
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        }
    </style>
</head>
<body class="text-slate-100 h-screen w-screen flex flex-col justify-between p-4 relative select-none">

    <canvas id="matrixDust" class="absolute inset-0 pointer-events-none z-0"></canvas>

    <header class="w-full flex justify-between items-center z-10 pt-1 shrink-0">
        <div>
            <h1 class="text-4xl font-black tracking-tighter hackii-glow font-digital">
                HACKII
            </h1>
            <p class="text-[9px] text-purple-400 font-mono tracking-widest uppercase">1-Min Block // Range Analyzer</p>
        </div>
        
        <div class="glass-card px-3 py-1 rounded-xl border border-slate-800">
            <span id="live-clock" class="font-digital text-xs text-cyan-400 tracking-wider">00:00:00 PM</span>
        </div>
    </header>

    <main class="w-full flex flex-col gap-4 my-auto z-10 relative">
        
        <div class="glass-card p-4 rounded-2xl border border-slate-800/80 shadow-md">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[10px] font-bold text-amber-400 tracking-widest uppercase">ENGINE PULSE RATIO</span>
                <span class="text-[10px] bg-amber-950/50 border border-amber-800/50 text-amber-400 px-1.5 py-0.5 rounded font-mono font-bold">LOOP: 60S</span>
            </div>
            
            <div class="flex items-center justify-between">
                <div id="countdown" class="font-digital text-4xl font-black text-amber-400 tracking-wider">
                    00:00
                </div>
                <div class="text-[9px] text-slate-500 font-mono text-right uppercase">
                    Reset Sync Target<br><span class="text-slate-400 font-bold">Every 1 Minute</span>
                </div>
            </div>

            <div class="w-full bg-slate-950 h-1 rounded-full mt-3 overflow-hidden border border-slate-900">
                <div id="progress-bar" class="bg-gradient-to-r from-amber-500 to-yellow-400 h-full w-full transition-all duration-1000 ease-linear"></div>
            </div>
        </div>

        <div class="glass-card p-6 rounded-3xl flex flex-col justify-between relative overflow-hidden border border-slate-800 neon-box">
            <span class="text-[10px] font-bold text-cyan-400 tracking-widest uppercase text-center block mb-5">ALIGNED PURE MATRIX</span>

            <div class="grid grid-cols-2 gap-4 justify-center px-4">
                
                <div class="flex flex-col gap-2.5 items-center">
                    <div id="digit-1" class="w-full font-digital text-7xl font-black text-center text-emerald-400 bg-slate-950/90 rounded-2xl py-5 border border-emerald-500/20 neon-digit">0</div>
                    <span id="tag-1" class="text-xs font-black tracking-widest font-mono px-4 py-1 rounded bg-slate-900 w-full text-center">--</span>
                </div>

                <div class="flex flex-col gap-2.5 items-center">
                    <div id="digit-2" class="w-full font-digital text-7xl font-black text-center text-emerald-400 bg-slate-950/90 rounded-2xl py-5 border border-emerald-500/20 neon-digit">0</div>
                    <span id="tag-2" class="text-xs font-black tracking-widest font-mono px-4 py-1 rounded bg-slate-900 w-full text-center">--</span>
                </div>

            </div>

            <div class="flex justify-between items-center text-[10px] font-mono text-slate-500 border-t border-slate-900 pt-4 mt-6">
                <span id="sync-status" class="text-emerald-400 flex items-center gap-1">
                    <span class="h-1 w-1 rounded-full bg-emerald-400 animate-ping"></span> Live Unified Logic State
                </span>
                <span id="last-update">Secured</span>
            </div>
        </div>

        <div class="glass-card p-4 rounded-2xl border border-slate-800/80">
            <span class="text-[10px] font-bold text-slate-400 tracking-widest uppercase mb-2 block border-b border-slate-900 pb-1">HISTORICAL RECENT INDEX</span>

            <div id="history-box" class="flex flex-col gap-2 max-h-[120px] overflow-y-auto">
                </div>
        </div>

    </main>

    <footer class="w-full text-center text-[9px] text-slate-700 font-mono tracking-widest shrink-0 pb-1 z-10">
        SECURE INTEGRATION LOCK // REFRESH STABLE FORMULA
    </footer>

    <script>
        const LOOP_SECONDS = 60; // Strict 1-Minute Sync Loop
        let activeBlockIndex = -1;

        // 1. CLOCK SYNCHRONIZATION RUNNER
        function triggerClockPipeline() {
            const timeObj = new Date();
            document.getElementById('live-clock').innerText = timeObj.toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
            });
            
            processTimeCoreEngine();
        }
        setInterval(triggerClockPipeline, 1000);

        // 2. MATHEMATICAL 1-MINUTE RANGE BLOCK CALCULATIONS (TRUE BLOCK DUAL MODE)
        function extractDynamicMetrics(blockOffset = 0) {
            const now = new Date();
            
            let baseReset = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 5, 30, 0, 0);
            if (now < baseReset) { baseReset.setDate(baseReset.getDate() - 1); }

            const deltaSeconds = Math.floor((now - baseReset) / 1000);
            // Offset logic for history reconstruction
            const targetBlockId = Math.floor(deltaSeconds / LOOP_SECONDS) - blockOffset;
            const countdownRemaining = LOOP_SECONDS - (deltaSeconds % LOOP_SECONDS);

            // STEP 1: Pura 1-minute ka block SMALL hoga ya BIG, yeh mathematical seed decide karega (0 = SMALL, 1 = BIG)
            const masterSeed = (targetBlockId + 1) * 357 + baseReset.getDate() * 149;
            const masterDecision = Math.floor(Math.abs(Math.sin(masterSeed) * 1000)) % 2; 

            // STEP 2: Us single block range ke andar do alag-alag digits nikalna (0-4 or 5-9)
            const digits = [];
            for (let i = 1; i <= 2; i++) {
                // Har digit ke liye alag variable calculation multiplier lagaya hai
                const subSeed = (targetBlockId + 1) * (i * 127) + baseReset.getDate() * 563;
                const rawVal = Math.floor(Math.abs(Math.cos(subSeed) * 7000)) % 5; // Hamesha 0 se 4 nikalega
                
                if (masterDecision === 1) {
                    // Agar BIG block hai -> Shift range to 5-9
                    digits.push(rawVal + 5); 
                } else {
                    // Agar SMALL block hai -> Keep range 0-4
                    digits.push(rawVal);
                }
            }

            return {
                blockID: targetBlockId + 1,
                countdown: countdownRemaining,
                digit1: digits[0],
                digit2: digits[1],
                isBig: masterDecision === 1
            };
        }

        // 3. PIPELINE REFRESH MATCHING MACHINE
        function processTimeCoreEngine() {
            const data = extractDynamicMetrics(0);
            
            const s = String(data.countdown % 60).padStart(2, '0');
            const countDisplay = document.getElementById('countdown');
            countDisplay.innerText = `00:${s}`;
            
            document.getElementById('progress-bar').style.width = `${(data.countdown / LOOP_SECONDS) * 100}%`;

            if(data.countdown <= 10) {
                countDisplay.className = "font-digital text-4xl font-black text-red-500 animate-pulse";
            } else {
                countDisplay.className = "font-digital text-4xl font-black text-amber-400";
            }

            if (activeBlockIndex !== data.blockID) {
                executeEngineDraw(data);
                activeBlockIndex = data.blockID;
            }
        }

        // 4. MATRIX SHUFFLE & RANGE ASSIGNER
        function executeEngineDraw(dataObj) {
            const statusNode = document.getElementById('sync-status');
            statusNode.innerHTML = `⏳ Synchronizing Range Matrix...`;
            statusNode.className = "text-amber-400 font-mono";

            const cells = [document.getElementById('digit-1'), document.getElementById('digit-2')];
            const tags = [document.getElementById('tag-1'), document.getElementById('tag-2')];

            cells.forEach(c => c.className = "w-full font-digital text-7xl font-black text-center text-slate-700 bg-slate-950/90 rounded-2xl py-5 border border-slate-900");
            tags.forEach(t => {
                t.innerText = "ROLL";
                t.className = "text-xs font-black tracking-widest font-mono px-4 py-1 rounded bg-slate-950 text-slate-600 w-full text-center";
            });

            let iterations = 0;
            const scrollInterval = setInterval(() => {
                cells.forEach(c => c.innerText = Math.floor(Math.random() * 10));
                iterations++;

                if (iterations > 12) {
                    clearInterval(scrollInterval);

                    // Output mathematically range-locked values
                    cells[0].innerText = dataObj.digit1;
                    cells[1].innerText = dataObj.digit2;

                    cells.forEach(cell => {
                        cell.className = "w-full font-digital text-7xl font-black text-center text-emerald-400 bg-slate-950/90 rounded-2xl py-5 border border-emerald-500/20 text-shadow-[0_0_15px_rgba(16,185,129,0.4)]";
                    });
                    
                    // Dono cards ka tag hamesha exact same block logic ko dikhayega
                    tags.forEach(tag => {
                        if (dataObj.isBig) {
                            tag.innerText = "BIG";
                            tag.className = "text-xs font-black tracking-widest font-mono px-4 py-1 rounded bg-pink-950/40 border border-pink-900/50 text-pink-400 text-shadow-[0_0_10px_rgba(244,63,94,0.3)] w-full text-center";
                        } else {
                            tag.innerText = "SMALL";
                            tag.className = "text-xs font-black tracking-widest font-mono px-4 py-1 rounded bg-cyan-950/40 border border-cyan-900/50 text-cyan-400 text-shadow-[0_0_10px_rgba(6,182,212,0.3)] w-full text-center";
                        }
                    });

                    const exactTime = new Date().toLocaleTimeString();
                    document.getElementById('last-update').innerText = `Synced: ${exactTime}`;
                    
                    statusNode.innerHTML = `<span class="h-1 w-1 rounded-full bg-emerald-400 animate-ping"></span> Range Matched`;
                    statusNode.className = "text-emerald-400 flex items-center gap-1";

                    compileHistoryLog(dataObj, exactTime);
                }
            }, 40);
        }

        // 5. DATA HISTORY LOG COMPILER
        function compileHistoryLog(dataObj, timestamp) {
            const container = document.getElementById('history-box');
            const row = document.createElement('div');

            const tagString = dataObj.isBig ? 
                `<span class="text-[10px] font-bold text-pink-400 px-2 bg-pink-950/20 rounded border border-pink-900/30">BIG BLOCK</span>` : 
                `<span class="text-[10px] font-bold text-cyan-400 px-2 bg-cyan-950/20 rounded border border-cyan-900/30">SMALL BLOCK</span>`;

            row.className = "flex justify-between items-center bg-slate-950/80 px-4 py-2 rounded-xl border border-slate-900/80";
            row.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="text-[10px] text-slate-500 font-mono">${timestamp}</span>
                    <div>${tagString}</div>
                </div>
                <span class="font-digital font-black text-base text-emerald-400 tracking-[0.4em]">${dataObj.digit1}${dataObj.digit2}</span>
            `;

            container.insertBefore(row, container.firstChild);

            if(container.children.length > 4) {
                container.removeChild(container.lastChild);
            }
        }

        // 6. CANVAS AMBIENT MATRIX PARTICLES
        const canvas = document.getElementById('matrixDust');
        const ctx = canvas.getContext('2d');
        let dustArray = [];

        function setBoundaries() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', setBoundaries);
        setBoundaries();

        class Dust {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.speed = Math.random() * 0.12 + 0.04;
            }
            slide() {
                this.y += this.speed;
                if(this.y > canvas.height) this.y = 0;
            }
            render() {
                ctx.fillStyle = 'rgba(153, 0, 255, 0.08)';
                ctx.fillRect(this.x, this.y, 1.2, 1.2);
            }
        }

        function createEngineDust() {
            for(let i = 0; i < 35; i++) dustArray.push(new Dust());
        }

        function loopAnimation() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dustArray.forEach(d => { d.slide(); d.render(); });
            requestAnimationFrame(loopAnimation);
        }

        // CORE ENGINE KICKSTART ENTRYPOINT
        window.onload = function() {
            createEngineDust();
            loopAnimation();
            triggerClockPipeline();

            // Direct refresh par dynamic history blocks build karna mathematically 
            for (let x = 1; x <= 3; x++) {
                const pastData = extractDynamicMetrics(x);
                if (pastData.blockID > 0) {
                    compileHistoryLog(pastData, `Past -${x}m`);
                }
            }
        };
    </script>
</body>
</html>
