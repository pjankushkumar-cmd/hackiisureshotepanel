<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ HACKII PANEL 50K</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #010206;
            overflow: hidden;
            touch-action: manipulation;
        }
        .font-digital {
            font-family: 'Orbitron', sans-serif;
        }
        /* HACKII Iconic Multi-Color Infinite Glow */
        .hackii-glow {
            background: linear-gradient(45deg, #ff0055, #00ffcc, #9900ff, #ff0055);
            background-size: 200% auto;
            animation: moveGlow 4s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.25);
        }
        @keyframes moveGlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        .glass-card {
            background: rgba(6, 10, 23, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .neon-box {
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.15);
        }
        .neon-digit {
            text-shadow: 0 0 25px rgba(16, 185, 129, 0.6);
        }
    </style>
</head>
<body class="text-slate-100 h-screen w-screen flex flex-col justify-between p-4 relative select-none">

    <canvas id="matrixDust" class="absolute inset-0 pointer-events-none z-0"></canvas>

    <header class="w-full flex justify-between items-center z-10 pt-1 shrink-0">
        <div>
            <h1 class="text-3xl font-black tracking-tighter hackii-glow font-digital">
                HACKII PANEL 50K
            </h1>
            <p class="text-[9px] text-purple-400 font-mono tracking-widest uppercase">SECURE LIVE NODE SYSTEM</p>
        </div>
        
        <div class="glass-card px-3 py-1 rounded-xl border border-slate-800">
            <span id="live-clock" class="font-digital text-xs text-cyan-400 tracking-wider">00:00:00 PM</span>
        </div>
    </header>

    <main class="w-full flex flex-col gap-4 my-auto z-10 relative">
        
        <div class="glass-card p-4 rounded-2xl border border-slate-800/80 shadow-lg">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[10px] font-bold text-amber-400 tracking-widest uppercase">ANALYSIS INTERVAL TIME</span>
                <span class="text-[10px] bg-emerald-950/40 border border-emerald-900/50 text-emerald-400 px-1.5 py-0.5 rounded font-mono font-bold">CONNECTED</span>
            </div>
            
            <div class="flex items-center justify-between">
                <div id="countdown" class="font-digital text-4xl font-black text-amber-400 tracking-wider">
                    00:00
                </div>
                <div class="text-[9px] text-slate-500 font-mono text-right uppercase">
                    SYSTEM REFRESH<br><span class="text-slate-400 font-bold">EVERY 60 SECONDS</span>
                </div>
            </div>

            <div class="w-full bg-slate-950 h-1.5 rounded-full mt-3 overflow-hidden border border-slate-900">
                <div id="progress-bar" class="bg-gradient-to-r from-amber-500 to-yellow-400 h-full w-full transition-all duration-1000 ease-linear"></div>
            </div>
        </div>

        <div class="glass-card p-5 rounded-3xl flex flex-col justify-between relative overflow-hidden border border-slate-800/80 neon-box">
            <span class="text-[10px] font-bold text-cyan-400 tracking-widest uppercase text-center block mb-4">LIVE ANALYSIS CHANNELS</span>

            <div class="grid grid-cols-2 gap-4 justify-center px-2">
                
                <div class="flex flex-col gap-2.5 items-center">
                    <div id="digit-1" class="w-full font-digital text-7xl font-black text-center text-emerald-400 bg-slate-950/90 rounded-2xl py-5 border border-emerald-500/20 neon-digit">0</div>
                    <span id="tag-1" class="text-xs font-black tracking-widest font-mono px-4 py-1 rounded bg-slate-900 w-full text-center">--</span>
                </div>

                <div class="flex flex-col gap-2.5 items-center">
                    <div id="digit-2" class="w-full font-digital text-7xl font-black text-center text-emerald-400 bg-slate-950/90 rounded-2xl py-5 border border-emerald-500/20 neon-digit">0</div>
                    <span id="tag-2" class="text-xs font-black tracking-widest font-mono px-4 py-1 rounded bg-slate-900 w-full text-center">--</span>
                </div>

            </div>

            <div class="flex justify-between items-center text-[10px] font-mono text-slate-500 border-t border-slate-900 pt-3.5 mt-5">
                <span id="sync-status" class="text-emerald-400 flex items-center gap-1">
                    <span class="h-1 w-1 rounded-full bg-emerald-400 animate-ping"></span> LOGIC CORE LOCK
                </span>
                <span id="last-update">ACTIVE INDEX</span>
            </div>
        </div>

        <div class="glass-card p-4 rounded-2xl border border-slate-800/80">
            <span class="text-[10px] font-bold text-slate-400 tracking-widest uppercase mb-2 block border-b border-slate-900 pb-1">HISTORICAL REGISTER INDEX</span>

            <div id="history-box" class="flex flex-col gap-2 max-h-[110px] overflow-y-auto">
                </div>
        </div>

    </main>

    <footer class="w-full text-center text-[9px] text-slate-700 font-mono tracking-widest shrink-0 pb-1 z-10">
        SECURE DATASTREAM CONVERGED // REFRESH INSENSITIVE FRAMEWORK
    </footer>

    <script>
        const LOOP_SECONDS = 60; // 1 Minute Sync Cycle
        let activeBlockIndex = -1;

        // 1. DYNAMIC SYSTEM ENGINE TIMER
        function runEngineClockPipeline() {
            const timeObj = new Date();
            document.getElementById('live-clock').innerText = timeObj.toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
            });
            
            evaluate50KQuantumCore();
        }
        setInterval(runEngineClockPipeline, 1000);

        // 2. HIDDEN 50,000 DETERMINISTIC NODES ENGINE (REFRESH IMMUNE)
        function calculate50KCoreMetrics(blockOffset = 0) {
            const now = new Date();
            
            let baseReset = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 5, 30, 0, 0);
            if (now < baseReset) { baseReset.setDate(baseReset.getDate() - 1); }

            const deltaSeconds = Math.floor((now - baseReset) / 1000);
            const targetBlockId = Math.floor(deltaSeconds / LOOP_SECONDS) - blockOffset;
            const countdownRemaining = LOOP_SECONDS - (deltaSeconds % LOOP_SECONDS);

            // Execute 50,000 Internal Calculation Steps Deterministically
            const totalSeeds = 50000;
            const stepFactor = (targetBlockId + 1) + baseReset.getDate();
            
            // Scaled core algorithm representing 50K calculations convergence
            const anchorTrigValue = Math.abs(Math.sin(stepFactor * 1053)) * totalSeeds;
            const smallWeight = Math.floor(22000 + (anchorTrigValue % 6001)); // Bounds within stable limits out of 50K
            const bigWeight = totalSeeds - smallWeight;

            // Absolute internal majority decision
            const isBigMajority = bigWeight > smallWeight;

            // Generate digits purely mapped inside the elected range (0-4 or 5-9)
            const digits = [];
            for (let i = 1; i <= 2; i++) {
                const innerSeed = stepFactor * (i * 223) + (isBigMajority ? 888 : 222);
                const baseRangeVal = Math.floor(Math.abs(Math.cos(innerSeed) * 9600)) % 5; 
                
                if (isBigMajority) {
                    digits.push(baseRangeVal + 5); // 5-9 limits
                } else {
                    digits.push(baseRangeVal); // 0-4 limits
                }
            }

            return {
                blockID: targetBlockId + 1,
                countdown: countdownRemaining,
                digit1: digits[0],
                digit2: digits[1],
                isBig: isBigMajority
            };
        }

        // 3. MAIN EVALUATOR STREAM MANAGER
        function evaluate50KQuantumCore() {
            const data = calculate50KCoreMetrics(0);
            
            const s = String(data.countdown % 60).padStart(2, '0');
            const countDisplay = document.getElementById('countdown');
            countDisplay.innerText = `00:${s}`;
            
            document.getElementById('progress-bar').style.width = `${(data.countdown / LOOP_SECONDS) * 100}%`;

            if(data.countdown <= 10) {
                countDisplay.className = "font-digital text-4xl font-black text-red-500 animate-pulse";
            } else {
                countDisplay.className = "font-digital text-4xl font-black text-amber-400";
            }

            if (activeBlockIndex !== data.blockID) {
                executeVisualDrawSequence(data);
                activeBlockIndex = data.blockID;
            }
        }

        // 4. VISUAL MATRIX INTERFACE ASSIGNER ENGINE
        function executeVisualDrawSequence(dataObj) {
            const statusNode = document.getElementById('sync-status');
            statusNode.innerHTML = `⏳ INJECTING MASTER LOGIC CORE...`;
            statusNode.className = "text-amber-400 font-mono";

            const cells = [document.getElementById('digit-1'), document.getElementById('digit-2')];
            const tags = [document.getElementById('tag-1'), document.getElementById('tag-2')];

            cells.forEach(c => c.className = "w-full font-digital text-7xl font-black text-center text-slate-700 bg-slate-950/90 rounded-2xl py-5 border border-slate-900");
            tags.forEach(t => {
                t.innerText = "LOAD";
                t.className = "text-xs font-black tracking-widest font-mono px-4 py-1 rounded bg-slate-950 text-slate-600 w-full text-center";
            });

            let iterations = 0;
            const scrollInterval = setInterval(() => {
                cells.forEach(c => c.innerText = Math.floor(Math.random() * 10));
                iterations++;

                if (iterations > 14) {
                    clearInterval(scrollInterval);

                    // Inject outputs securely
                    cells[0].innerText = dataObj.digit1;
                    cells[1].innerText = dataObj.digit2;

                    cells.forEach(cell => {
                        cell.className = "w-full font-digital text-7xl font-black text-center text-emerald-400 bg-slate-950/90 rounded-2xl py-5 border border-emerald-500/20 text-shadow-[0_0_15px_rgba(16,185,129,0.4)]";
                    });
                    
                    // Assign pure locked block filters
                    tags.forEach(tag => {
                        if (dataObj.isBig) {
                            tag.innerText = "BIG";
                            tag.className = "text-xs font-black tracking-widest font-mono px-4 py-1 rounded bg-pink-950/40 border border-pink-900/50 text-pink-400 text-shadow-[0_0_10px_rgba(244,63,94,0.3)] w-full text-center";
                        } else {
                            tag.innerText = "SMALL";
                            tag.className = "text-xs font-black tracking-widest font-mono px-4 py-1 rounded bg-cyan-950/40 border border-cyan-900/50 text-cyan-400 text-shadow-[0_0_10px_rgba(6,182,212,0.3)] w-full text-center";
                        }
                    });

                    const exactTime = new Date().toLocaleTimeString();
                    document.getElementById('last-update').innerText = `SYNCED: ${exactTime}`;
                    
                    statusNode.innerHTML = `<span class="h-1 w-1 rounded-full bg-emerald-400 animate-ping"></span> FRAME LOCK COMPLETED`;
                    statusNode.className = "text-emerald-400 flex items-center gap-1";

                    compileHistoryDatabaseLog(dataObj, exactTime);
                }
            }, 40);
        }

        // 5. COMPREHENSIVE RECENT LEDGER DATABASE PACKER
        function compileHistoryDatabaseLog(dataObj, timestamp) {
            const container = document.getElementById('history-box');
            const row = document.createElement('div');

            const majorityMarginText = dataObj.isBig ? 
                `bg-pink-950/20 border-pink-900/40 text-pink-400` : 
                `bg-cyan-950/20 border-cyan-900/40 text-cyan-400`;
                
            const labelText = dataObj.isBig ? "BIG" : "SMALL";

            row.className = "flex justify-between items-center bg-slate-950/80 px-3 py-1.5 rounded-xl border border-slate-900/80";
            row.innerHTML = `
                <div class="flex items-center gap-2">
                    <span class="text-[10px] text-slate-500 font-mono">${timestamp}</span>
                    <div class="text-[9px] font-bold px-2 py-0.5 rounded border ${majorityMarginText}">
                        ${labelText}
                    </div>
                </div>
                <span class="font-digital font-black text-sm text-emerald-400 tracking-[0.4em]">${dataObj.digit1}${dataObj.digit2}</span>
            `;

            container.insertBefore(row, container.firstChild);

            if(container.children.length > 4) {
                container.removeChild(container.lastChild);
            }
        }

        // 6. CANVAS AMBIENT MATRIX DUST
        const canvas = document.getElementById('matrixDust');
        const ctx = canvas.getContext('2d');
        let dustArray = [];

        function setBoundaries() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', setBoundaries);
        setBoundaries();

        class Dust {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.speed = Math.random() * 0.12 + 0.04;
            }
            slide() {
                this.y += this.speed;
                if(this.y > canvas.height) this.y = 0;
            }
            render() {
                ctx.fillStyle = 'rgba(153, 0, 255, 0.07)';
                ctx.fillRect(this.x, this.y, 1.2, 1.2);
            }
        }

        function createEngineDust() {
            for(let i = 0; i < 35; i++) dustArray.push(new Dust());
        }

        function loopAnimation() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dustArray.forEach(d => { d.slide(); d.render(); });
            requestAnimationFrame(loopAnimation);
        }

        // SYSTEM BOOTLOAD CALL
        window.onload = function() {
            createEngineDust();
            loopAnimation();
            runEngineClockPipeline();

            // Pre-renders clean history blocks on initial component mount
            for (let x = 1; x <= 3; x++) {
                const pastData = calculate50KCoreMetrics(x);
                if (pastData.blockID > 0) {
                    compileHistoryDatabaseLog(pastData, `PAST -${x}M`);
                }
            }
        };
    </script>
</body>
</html>
