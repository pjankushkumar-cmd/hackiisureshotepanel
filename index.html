<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ HACKII PREMIUM ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #020617;
            overflow: hidden;
            touch-action: manipulation;
        }
        .font-digital {
            font-family: 'Orbitron', sans-serif;
        }
        /* Color Pop & Rainbow Gradient for HACKII */
        .hackii-gradient {
            background: linear-gradient(45deg, #ff007f, #7928ca, #00dfd8, #ff007f);
            background-size: 300% 300%;
            animation: rainbowShift 6s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* Neon Highlights */
        .neon-glow-cyan {
            box-shadow: 0 0 25px rgba(6, 182, 212, 0.2);
            border: 1px solid rgba(6, 182, 212, 0.4);
        }
        .neon-digit {
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.7);
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
    </style>
</head>
<body class="text-slate-100 h-screen w-screen flex flex-col justify-between p-4 relative select-none">

    <canvas id="bgCanvas" class="absolute inset-0 pointer-events-none z-0"></canvas>

    <header class="w-full flex justify-between items-center z-10 pt-2 shrink-0">
        <div>
            <h1 id="brand-tag" class="text-3xl font-black tracking-tighter hackii-gradient font-digital">
                HACKII
            </h1>
            <p class="text-[9px] text-cyan-400/80 font-mono tracking-widest uppercase">Quantum 4-Digit Stream</p>
        </div>
        
        <div class="glass-card px-3 py-1.5 rounded-xl text-right border border-slate-800">
            <span id="live-clock" class="font-digital text-sm text-cyan-400 tracking-wider">00:00:00 AM</span>
        </div>
    </header>

    <main class="w-full flex flex-col gap-4 my-auto z-10 relative justify-center">
        
        <div class="glass-card p-4 rounded-2xl flex flex-col justify-between border border-slate-800/80">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[10px] font-bold text-amber-500 tracking-widest uppercase">Next Sync Draw</span>
                <span class="text-[10px] font-mono text-slate-500">RESET: 5:30 AM</span>
            </div>
            
            <div class="flex items-center justify-between">
                <div id="countdown" class="font-digital text-4xl font-black text-amber-500 tracking-wide">
                    02:30
                </div>
                <div class="text-[10px] text-slate-400 font-mono text-right">
                    LOOP INTERVAL<br><span class="text-amber-400 font-bold">150 SECONDS</span>
                </div>
            </div>

            <div class="w-full bg-slate-950 h-1.5 rounded-full mt-3 overflow-hidden border border-slate-900">
                <div id="progress-bar" class="bg-gradient-to-r from-amber-500 to-orange-500 h-full w-full transition-all duration-1000 ease-linear"></div>
            </div>
        </div>

        <div class="glass-card p-6 rounded-3xl text-center flex flex-col justify-between relative overflow-hidden neon-glow-cyan">
            <span class="text-[11px] font-bold text-cyan-400 tracking-widest uppercase block mb-4">Live Matrix Output</span>

            <div class="grid grid-cols-4 gap-3 my-auto py-2 justify-center px-1">
                <div id="digit-1" class="font-digital text-6xl font-black text-emerald-400 bg-slate-950/80 rounded-2xl py-4 border border-emerald-500/20 neon-digit">0</div>
                <div id="digit-2" class="font-digital text-6xl font-black text-emerald-400 bg-slate-950/80 rounded-2xl py-4 border border-emerald-500/20 neon-digit">0</div>
                <div id="digit-3" class="font-digital text-6xl font-black text-emerald-400 bg-slate-950/80 rounded-2xl py-4 border border-emerald-500/20 neon-digit">0</div>
                <div id="digit-4" class="font-digital text-6xl font-black text-emerald-400 bg-slate-950/80 rounded-2xl py-4 border border-emerald-500/20 neon-digit">0</div>
            </div>

            <div class="flex justify-between items-center text-[10px] font-mono text-slate-500 border-t border-slate-800/60 pt-4 mt-4">
                <span id="sync-status" class="text-emerald-400 flex items-center gap-1">
                    <span class="h-1.5 w-1.5 rounded-full bg-emerald-400 animate-pulse"></span> Refresh Proof Safe Logic
                </span>
                <span id="last-update">Init: Active</span>
            </div>
        </div>

        <div class="glass-card p-4 rounded-2xl flex flex-col justify-between border border-slate-800/80">
            <span class="text-[10px] font-bold text-slate-400 tracking-widest uppercase mb-2 block border-b border-slate-800/60 pb-1.5">Recent Generated Sequence</span>

            <div id="history-box" class="flex flex-col gap-2 max-h-[140px] overflow-y-auto pr-0.5">
                </div>
        </div>

    </main>

    <footer class="w-full text-center text-[9px] text-slate-600 font-mono tracking-wider shrink-0 pb-2 z-10">
        HACKII MATRIX ENGINE // MATHEMATICAL CORRELATION SECURE
    </footer>

    <script>
        const BLOCK_LOOP = 150; // 2.5 Minutes loop in seconds
        let currentSecondsLeft = BLOCK_LOOP;
        let activePeriodIndex = 0;

        // 1. DIGITAL LIVE CLOCK SYSTEM
        function updateSystemClock() {
            const timeObj = new Date();
            document.getElementById('live-clock').innerText = timeObj.toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
            });
            
            // Execute automated synchronization logic every second
            syncEnginePipeline();
        }
        setInterval(updateSystemClock, 1000);

        // 2. MATHEMATICAL TIME-ALIGNED SEED LOGIC (REFRESH PROOF)
        function calculateTimeBlockMetrics() {
            const now = new Date();
            
            // Core Daily Reset Baseline: Today at 5:30 AM
            let resetBase = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 5, 30, 0, 0);
            
            // Handle early morning rollbacks
            if (now < resetBase) {
                resetBase.setDate(resetBase.getDate() - 1);
            }

            // Total seconds transpired since 5:30 AM
            const elapsedSeconds = Math.floor((now - resetBase) / 1000);
            
            // Extract current 2.5 minute sequence number
            const targetBlockIndex = Math.floor(elapsedSeconds / BLOCK_LOOP);
            
            // Remaining countdown seconds for current block
            const secondsRemaining = BLOCK_LOOP - (elapsedSeconds % BLOCK_LOOP);

            // Generate 4 deterministic digits using separate unique mathematical anchors
            const digits = [];
            for(let i = 1; i <= 4; i++) {
                const customSeed = (targetBlockIndex + 1) * (i * 31) + resetBase.getDate() * 97;
                const trigFormula = Math.abs(Math.sin(customSeed) * 1000) % 10;
                digits.push(Math.floor(trigFormula));
            }

            return {
                blockID: targetBlockIndex + 1,
                countdown: secondsRemaining,
                digitArray: digits
            };
        }

        // 3. PIPELINE REFRESH-PROOF ALIGNER
        function syncEnginePipeline() {
            const data = calculateTimeBlockMetrics();
            
            // Format countdown string
            const m = String(Math.floor(data.countdown / 60)).padStart(2, '0');
            const s = String(data.countdown % 60).padStart(2, '0');
            
            const countDisplay = document.getElementById('countdown');
            countDisplay.innerText = `${m}:${s}`;
            
            // Align Progress Indicator
            document.getElementById('progress-bar').style.width = `${(data.countdown / BLOCK_LOOP) * 100}%`;

            // Flash red warning if countdown dips below 15 seconds
            if(data.countdown <= 15) {
                countDisplay.className = "font-digital text-4xl font-black text-red-500 animate-pulse";
            } else {
                countDisplay.className = "font-digital text-4xl font-black text-amber-500";
            }

            // If new time block sequence index shifts, trigger matrix shuffle draw
            if (activePeriodIndex !== data.blockID) {
                executeMatrixShuffle(data.digitArray, data.blockID);
                activePeriodIndex = data.blockID;
            }
        }

        // 4. MATRIX SLOT MACHINE INDEPENDENT MULTI-DIGIT SHUFFLE
        function executeMatrixShuffle(finalDigits, sequenceId) {
            const syncStatus = document.getElementById('sync-status');
            syncStatus.innerHTML = `⏳ Matrix Syncing...`;
            syncStatus.className = "text-amber-400 font-mono";

            const slots = [
                document.getElementById('digit-1'),
                document.getElementById('digit-2'),
                document.getElementById('digit-3'),
                document.getElementById('digit-4')
            ];

            // Trigger visual text color off during roll
            slots.forEach(slot => {
                slot.className = "font-digital text-6xl font-black text-slate-700 bg-slate-950/80 rounded-2xl py-4 border border-slate-900";
            });

            let iterations = 0;
            const liveShuffle = setInterval(() => {
                slots.forEach(slot => {
                    slot.innerText = Math.floor(Math.random() * 10);
                });
                iterations++;

                // Stop roll sequence and apply final mathematical values
                if(iterations > 10) {
                    clearInterval(liveShuffle);
                    
                    finalDigits.forEach((digitValue, index) => {
                        slots[index].innerText = digitValue;
                        slots[index].className = "font-digital text-6xl font-black text-emerald-400 bg-slate-950/80 rounded-2xl py-4 border border-emerald-500/20 neon-digit transition-all duration-200";
                    });

                    const timestampStr = new Date().toLocaleTimeString();
                    document.getElementById('last-update').innerText = `Sync: ${timestampStr}`;
                    
                    syncStatus.innerHTML = `<span class="h-1.5 w-1.5 rounded-full bg-emerald-400 animate-pulse"></span> Time-Synced Live`;
                    syncStatus.className = "text-emerald-400 flex items-center gap-1";

                    // Prepend final sequence array into historical rows
                    appendHistoryRow(finalDigits.join(" "), timestampStr);
                }
            }, 40);
        }

        // 5. CLEAN DYNAMIC LOG PACKER
        function appendHistoryRow(digitString, timestamp) {
            const box = document.getElementById('history-box');
            const element = document.createElement('div');
            
            element.className = "flex justify-between items-center bg-slate-950/70 px-4 py-2 rounded-xl border border-slate-900";
            element.innerHTML = `
                <span class="text-xs text-slate-500 font-mono">${timestamp}</span>
                <span class="font-digital font-black text-base text-cyan-400 tracking-widest">${digitString}</span>
            `;
            
            box.insertBefore(element, box.firstChild);

            // Bounded historical records to max 4 slots for clear layout scaling
            if(box.children.length > 4) {
                box.removeChild(box.lastChild);
            }
        }

        // 6. MINIMAL CANVAS AMBIENT BACKGROUND INTERACTIVE PARTICLES
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let dots = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class MicroDot {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vY = Math.random() * 0.15 + 0.05;
            }
            update() {
                this.y += this.vY;
                if(this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = 'rgba(6, 182, 212, 0.08)';
                ctx.fillRect(this.x, this.y, 1.5, 1.5);
            }
        }

        function setupDots() {
            for(let i = 0; i < 40; i++) dots.push(new MicroDot());
        }

        function runAnimationLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dots.forEach(d => { d.update(); d.draw(); });
            requestAnimationFrame(runAnimationLoop);
        }

        // CORES ENGINE EXECUTION
        window.onload = function() {
            setupDots();
            runAnimationLoop();
            
            // Core Boot Call
            updateSystemClock();

            // Mathematically pre-fill history records on instant load based on past sequence blocks
            const initialMetrics = calculateTimeBlockMetrics();
            let refID = initialMetrics.blockID;
            for(let k = 1; k <= 3; k++) {
                let checkID = refID - k;
                if(checkID > 0) {
                    const historicalDigits = [];
                    for(let i = 1; i <= 4; i++) {
                        const pastSeed = checkID * (i * 31) + new Date().getDate() * 97;
                        historicalDigits.push(Math.floor(Math.abs(Math.sin(pastSeed) * 1000) % 10));
                    }
                    appendHistoryRow(historicalDigits.join(" "), `Past Step -${k}`);
                }
            }
        };
    </script>
</body>
</html>
