<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ QUANTUM RNG ENGINE V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #030712;
            overflow: hidden;
        }
        .font-digital {
            font-family: 'Orbitron', sans-serif;
        }
        /* Neon Glow Utility */
        .neon-border-cyan {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.15), inset 0 0 15px rgba(6, 182, 212, 0.05);
        }
        .neon-text-emerald {
            text-shadow: 0 0 30px rgba(16, 185, 129, 0.8), 0 0 60px rgba(16, 185, 129, 0.4);
        }
        .neon-text-amber {
            text-shadow: 0 0 25px rgba(245, 158, 11, 0.6);
        }
        /* Glassmorphism Panels */
        .glass-panel {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* Hide Scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-100 h-screen w-screen flex flex-col justify-between p-6 relative select-none">

    <canvas id="particleCanvas" class="absolute inset-0 pointer-events-none z-0"></canvas>

    <header class="w-full max-w-6xl mx-auto flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="h-3 w-3 rounded-full bg-cyan-500 animate-ping"></div>
            <div>
                <h1 class="text-lg font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 font-digital">
                    CORE.RNG // MATRIX v2.0
                </h1>
                <p class="text-[10px] text-slate-500 tracking-widest uppercase">Target Stream: numbergenerator.org/0-9</p>
            </div>
        </div>
        
        <div class="glass-panel px-4 py-2 rounded-xl text-right neon-border-cyan">
            <span class="text-[9px] text-slate-400 block tracking-widest font-bold">SYSTEM TIME</span>
            <span id="live-clock" class="font-digital text-base text-cyan-400 tracking-wider">00:00:00 PM</span>
        </div>
    </header>

    <main class="w-full max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6 my-auto items-stretch z-10 relative">
        
        <div class="glass-panel p-6 rounded-2xl flex flex-col justify-between neon-border-cyan lg:col-span-1 min-h-[220px]">
            <div>
                <span class="text-[11px] font-bold text-amber-500 tracking-widest block mb-1">CYCLE TIMEOUT</span>
                <h2 class="text-sm text-slate-400 font-semibold">Next Sync Intercept</h2>
            </div>
            
            <div class="my-auto py-2">
                <div id="countdown" class="font-digital text-5xl font-black text-amber-500 neon-text-amber">
                    02:30
                </div>
                <div class="w-full bg-slate-950 h-1 rounded-full mt-3 overflow-hidden border border-slate-800">
                    <div id="progress-bar" class="bg-gradient-to-r from-amber-500 to-orange-500 h-full w-full transition-all duration-1000 ease-linear"></div>
                </div>
            </div>

            <div class="text-[10px] text-slate-500 font-mono flex justify-between items-center">
                <span>FREQ: 150 SECONDS</span>
                <span class="text-amber-500/80">LOOP ACTIVE</span>
            </div>
        </div>

        <div class="glass-panel p-8 rounded-3xl text-center lg:col-span-2 flex flex-col justify-between relative overflow-hidden border border-emerald-500/20 shadow-[0_0_50px_rgba(16,185,129,0.03)] min-h-[360px]">
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-emerald-500/10 rounded-full blur-3xl"></div>
            
            <div class="flex justify-between items-center border-b border-slate-800/60 pb-3">
                <span class="text-xs font-bold text-emerald-400 tracking-widest">REALTIME QUANTUM OUTPUT</span>
                <span class="text-[10px] bg-emerald-950/80 text-emerald-400 border border-emerald-800 px-2 py-0.5 rounded font-mono font-bold">RANGE: 0-9</span>
            </div>

            <div class="my-auto py-4">
                <div id="lucky-number" class="font-digital text-[11rem] font-black text-emerald-400 neon-text-emerald tracking-tighter leading-none transition-all duration-300">
                    7
                </div>
            </div>

            <div class="flex justify-between items-center text-[11px] font-mono text-slate-500">
                <span id="sync-status" class="text-emerald-400 flex items-center gap-1.5">
                    <span class="h-1.5 w-1.5 rounded-full bg-emerald-400 animate-pulse"></span> Data Synced Successfully
                </span>
                <span id="last-update">Init: Ready</span>
            </div>
        </div>

        <div class="glass-panel p-6 rounded-2xl flex flex-col justify-between neon-border-cyan lg:col-span-1 min-h-[220px]">
            <div>
                <span class="text-[11px] font-bold text-cyan-400 tracking-widest block mb-2">STREAM HISTORIAN</span>
                <div class="h-px bg-slate-800 w-full mb-3"></div>
            </div>

            <div id="history-box" class="flex-1 overflow-y-auto space-y-2.5 max-h-[220px] pr-0.5">
                </div>
        </div>

    </main>

    <footer class="w-full max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center border-t border-slate-900 pt-4 z-10 text-xs text-slate-600 gap-4">
        <div>SYSTEM STATUS: SECURE CORE OPERATIONAL // 2026</div>
        <div>
            <button onclick="triggerEngineDraw()" class="bg-gradient-to-r from-cyan-950 to-slate-900 hover:from-cyan-900 hover:to-slate-800 text-cyan-400 hover:text-cyan-300 border border-cyan-800/60 font-bold tracking-wider text-[11px] px-5 py-2 rounded-xl transition-all active:scale-95 shadow-lg">
                ⚡ FORCE INTERCEPT DRAW (TEST)
            </button>
        </div>
    </footer>

    <script>
        const LOOP_INTERVAL = 150; // Exact 2.5 Minutes
        let timeEngineLeft = LOOP_INTERVAL;
        let runningEngine = null;

        // 1. LIVE MASTER PRECISION CLOCK
        function runPrecisionClock() {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-US', {
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
            });
        }
        setInterval(runPrecisionClock, 1000);
        runPrecisionClock();

        // 2. QUANTUM GENERATION ENGINE
        function triggerEngineDraw() {
            const numDisplay = document.getElementById('lucky-number');
            const syncStatus = document.getElementById('sync-status');
            
            // Visual Shuffle Sequence
            let shuffleCount = 0;
            numDisplay.classList.remove('neon-text-emerald', 'text-emerald-400');
            numDisplay.classList.add('text-slate-700');
            
            syncStatus.innerHTML = `⏳ Fetching Matrix Sequence...`;
            syncStatus.className = "text-amber-400 font-mono";

            const matrixShuffle = setInterval(() => {
                numDisplay.innerText = Math.floor(Math.random() * 10);
            }, 40);

            // Halt and output final absolute random item
            setTimeout(() => {
                clearInterval(matrixShuffle);

                // Cryptographically secure absolute random index 0-9
                const randomArray = new Uint32Array(1);
                window.crypto.getRandomValues(randomArray);
                const finalResult = randomArray[0] % 10;

                numDisplay.innerText = finalResult;
                numDisplay.classList.remove('text-slate-700');
                numDisplay.classList.add('neon-text-emerald', 'text-emerald-400');

                // Update Timestamps
                const timestamp = new Date().toLocaleTimeString();
                document.getElementById('last-update').innerText = `Fetched: ${timestamp}`;
                
                syncStatus.innerHTML = `<span class="h-1.5 w-1.5 rounded-full bg-emerald-400 anonymity-ping"></span> Data Synced Successfully`;
                syncStatus.className = "text-emerald-400 flex items-center gap-1.5";

                // Push to History Stream
                pushToStreamLogs(finalResult, timestamp);

                // Auto reset main state
                timeEngineLeft = LOOP_INTERVAL;
            }, 500);
        }

        // 3. LOG HISTORIAN APPRENDER
        function pushToStreamLogs(num, time) {
            const historyBox = document.getElementById('history-box');
            const row = document.createElement('div');
            
            // Premium contextual badge themes based on number outputs
            let accentColor = "text-cyan-400 bg-cyan-950/30 border-cyan-800/40";
            if (num % 2 === 0) accentColor = "text-emerald-400 bg-emerald-950/30 border-emerald-800/40";
            if (num === 0 || num === 5) accentColor = "text-purple-400 bg-purple-950/30 border-purple-800/40";

            row.className = "flex justify-between items-center bg-slate-950/80 px-3 py-2 rounded-xl border border-slate-900/60 animate-fade-in";
            row.innerHTML = `
                <span class="text-xs text-slate-500 font-mono">${time}</span>
                <span class="font-digital font-black text-sm px-2 py-0.5 rounded border ${accentColor}">${num}</span>
            `;
            
            historyBox.insertBefore(row, historyBox.firstChild);

            // Limit buffer visualization to top 6 logs for perfect screen layout layout
            if(historyBox.children.length > 6){
                historyBox.removeChild(historyBox.lastChild);
            }
        }

        // 4. STEP COUNTDOWN INTERACTION LOOP
        function launchCountdownLoop() {
            setInterval(() => {
                timeEngineLeft--;

                // Update Linear Bar Tracking Percent
                const percentLeft = (timeEngineLeft / LOOP_INTERVAL) * 100;
                document.getElementById('progress-bar').style.width = `${percentLeft}%`;

                // Format String Display
                const m = String(Math.floor(timeEngineLeft / 60)).padStart(2, '0');
                const s = String(timeEngineLeft % 60).padStart(2, '0');
                const countEl = document.getElementById('countdown');
                countEl.innerText = `${m}:${s}`;

                // Crisis Red Warning Shifter if clock dips under 15 seconds
                if(timeEngineLeft <= 15) {
                    countEl.className = "font-digital text-5xl font-black text-red-500 text-shadow-[0_0_20px_rgba(239,68,68,0.5)] animate-pulse";
                } else {
                    countEl.className = "font-digital text-5xl font-black text-amber-500 neon-text-amber";
                }

                if (timeEngineLeft <= 0) {
                    triggerEngineDraw();
                }
            }, 1000);
        }

        // 5. INTERIOR BACKGROUND SCIFI PARTICLES MATRIX
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.2 - 0.1;
                this.speedY = Math.random() * 0.2 - 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if(this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if(this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(6, 182, 212, 0.12)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for(let i = 0; i < 65; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        // STARTUP HOOKS
        window.onload = function() {
            initParticles();
            animateParticles();
            triggerEngineDraw(); // Kickstart first immediate loop
            launchCountdownLoop(); // Run clock tick engine
        };
    </script>
</body>
</html>
