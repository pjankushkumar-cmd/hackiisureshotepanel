<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACKII 20K QUANTUM ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #010206; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen">

    <div class="w-full max-w-sm p-8 bg-slate-900 rounded-3xl text-center border border-purple-500 shadow-2xl">
        <h1 class="text-3xl font-black text-cyan-400 mb-6 uppercase tracking-wider">Hackii 20K</h1>
        
        <div id="countdown" class="text-5xl font-mono font-bold text-amber-400 mb-8">00:00</div>
        
        <div class="flex justify-center gap-8 mb-8">
            <div id="digit-1" class="text-8xl font-black text-emerald-400">0</div>
            <div id="digit-2" class="text-8xl font-black text-emerald-400">0</div>
        </div>
        
        <div id="bs-indicator" class="text-3xl font-extrabold mb-6 italic tracking-widest">-</div>
        
        <div id="status-badge" class="px-6 py-2 bg-slate-800 rounded-full text-xs uppercase font-bold tracking-widest">Waiting...</div>
    </div>

    <script>
        function updateEngine() {
            const sec = new Date().getSeconds();
            const remaining = 60 - sec;
            document.getElementById('countdown').innerText = "00:" + String(remaining).padStart(2, '0');

            // 0-10 seconds remaining: Shuffling animation
            if (remaining >= 50 || remaining <= 10) {
                document.getElementById('digit-1').innerText = Math.floor(Math.random() * 10);
                document.getElementById('digit-2').innerText = Math.floor(Math.random() * 10);
                document.getElementById('status-badge').innerText = "Shuffling...";
                document.getElementById('status-badge').className = "px-6 py-2 bg-slate-800 rounded-full text-xs uppercase font-bold tracking-widest text-gray-400";
                document.getElementById('bs-indicator').innerText = "-";
                document.getElementById('bs-indicator').className = "text-3xl font-extrabold mb-6 italic tracking-widest text-white";
            } else {
                // Settle Result
                if (document.getElementById('status-badge').innerText !== "Stable") {
                    const isBig = Math.random() > 0.5;
                    const r = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
                    
                    const d1 = isBig ? r(5, 9) : r(0, 4);
                    const d2 = isBig ? r(5, 9) : r(0, 4);
                    
                    document.getElementById('digit-1').innerText = d1;
                    document.getElementById('digit-2').innerText = d2;
                    document.getElementById('status-badge').innerText = "Stable";
                    document.getElementById('status-badge').className = "px-6 py-2 bg-emerald-900/30 rounded-full text-xs uppercase font-bold tracking-widest text-emerald-400";
                    
                    // Logic for B/S
                    const sum = d1 + d2;
                    const result = sum >= 10 ? "BIG" : "SMALL";
                    document.getElementById('bs-indicator').innerText = result;
                    document.getElementById('bs-indicator').className = sum >= 10 
                        ? "text-3xl font-extrabold mb-6 italic tracking-widest text-red-500" 
                        : "text-3xl font-extrabold mb-6 italic tracking-widest text-blue-400";
                }
            }
        }
        setInterval(updateEngine, 100);
    </script>
</body>
</html>
