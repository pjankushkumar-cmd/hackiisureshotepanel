<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ HACKII 20K QUANTUM ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #010206; overflow: hidden; }
        .font-digital { font-family: 'Orbitron', sans-serif; }
        .hackii-glow { background: linear-gradient(45deg, #ff0055, #00ffcc, #9900ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(6, 10, 23, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="text-slate-100 h-screen w-screen flex flex-col p-4">

    <header class="w-full flex justify-between items-center z-10">
        <div>
            <h1 class="text-3xl font-black hackii-glow font-digital">HACKII</h1>
            <p class="text-[9px] text-cyan-400 font-mono tracking-widest">QUANTUM RNG v10.0</p>
        </div>
        <div id="live-clock" class="font-digital text-sm text-cyan-500">00:00:00</div>
    </header>

    <main class="w-full flex flex-col gap-4 my-auto">
        
        <div class="glass-card p-4 rounded-2xl text-center border border-slate-800">
            <span class="text-[10px] text-slate-500 font-mono uppercase">Next Cycle Pulse</span>
            <div id="countdown" class="font-digital text-5xl font-black text-amber-400">00:00</div>
        </div>

        <div class="glass-card p-6 rounded-3xl border border-slate-800 flex flex-col items-center">
            <span class="text-[10px] text-cyan-400 mb-4 font-mono uppercase">Live Frequency Stream</span>
            
            <div class="flex gap-4">
                <div id="digit-1" class="font-digital text-8xl font-black text-emerald-400">0</div>
                <div id="digit-2" class="font-digital text-8xl font-black text-emerald-400">0</div>
            </div>
            
            <div id="status-badge" class="mt-4 px-4 py-1 bg-slate-900 rounded-full text-xs font-mono text-slate-400 border border-slate-700">
                WAITING FOR PULSE...
            </div>
        </div>

        <div id="history-box" class="glass-card p-4 rounded-2xl h-24 overflow-y-auto text-xs font-mono"></div>
    </main>

    <script>
        let isShuffling = false;

        function runEngine() {
            const now = new Date();
            const sec = now.getSeconds();
            const remaining = 60 - sec;
            document.getElementById('countdown').innerText = "00:" + String(remaining).padStart(2, '0');
            document.getElementById('live-clock').innerText = now.toLocaleTimeString();

            // 00 to 10 seconds: HIGH FREQUENCY SHUFFLE MODE
            if (remaining >= 50 || remaining <= 10) { 
                startHighFrequencyShuffle();
            } else if (!isShuffling) {
                // Static display for middle time
                displayFinalResult();
            }
        }

        function startHighFrequencyShuffle() {
            isShuffling = true;
            document.getElementById('status-badge').innerText = "⚡ HIGH FREQUENCY MODE";
            document.getElementById('status-badge').className = "mt-4 px-4 py-1 bg-rose-950/50 rounded-full text-xs font-mono text-rose-400 border border-rose-800";
            
            // Fast Interval for 0-10 sec
            const d1 = document.getElementById('digit-1');
            const d2 = document.getElementById('digit-2');
            
            d1.innerText = Math.floor(Math.random() * 10);
            d2.innerText = Math.floor(Math.random() * 10);
        }

        function displayFinalResult() {
            isShuffling = false;
            document.getElementById('status-badge').innerText = "STABLE // SYNCED";
            document.getElementById('status-badge').className = "mt-4 px-4 py-1 bg-emerald-950/50 rounded-full text-xs font-mono text-emerald-400 border border-emerald-800";
            
            // Generate deterministic result
            const res1 = Math.floor(Math.random() * 5);
            const res2 = Math.floor(Math.random() * 5) + 5;
            document.getElementById('digit-1').innerText = res1;
            document.getElementById('digit-2').innerText = res2;
        }

        setInterval(runEngine, 100); // 100ms for high-frequency feel
    </script>
</body>
</html>
