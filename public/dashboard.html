<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKII 20K QUANTUM ENGINE</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(circle at top,#13203f,#03040a 60%);min-height:100vh;overflow:hidden;font-family:sans-serif;display:flex;justify-content:center;align-items:center}
.bg-anim{position:absolute;width:100%;height:100%;overflow:hidden;z-index:0}
.ball{position:absolute;border-radius:50%;filter:blur(70px);opacity:.18;animation:float 12s infinite linear}
.ball:nth-child(1){width:250px;height:250px;background:#00ffff;left:5%;top:10%}
.ball:nth-child(2){width:300px;height:300px;background:#ff00ff;right:5%;bottom:10%;animation-duration:18s}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-40px)}100%{transform:translateY(0)}}
.card{position:relative;z-index:2;width:95%;max-width:450px;background:rgba(255,255,255,.05);backdrop-filter:blur(25px);border:1px solid rgba(255,255,255,.1);border-radius:35px;padding:30px;box-shadow:0 0 25px rgba(0,255,255,.25),0 0 70px rgba(0,255,255,.12)}
.title{font-size:38px;font-weight:900;color:#00ffff;text-shadow:0 0 20px #00ffff}
.sub{color:#94a3b8;font-size:12px;letter-spacing:3px}
.timer{font-size:70px;font-weight:900;color:#ffd700;text-shadow:0 0 25px #ffd700}
.digits{display:flex;justify-content:center;gap:35px;margin-top:10px}
.digit{font-size:95px;font-weight:900;color:#22c55e;text-shadow:0 0 15px currentColor,0 0 40px currentColor}
.bigsmall{font-size:40px;font-weight:900;margin-top:15px}
.status{margin-top:20px;padding:12px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:2px;background:#111827}
.history{margin-top:20px;background:rgba(255,255,255,.04);padding:15px;border-radius:18px;font-size:13px;color:#cbd5e1;height:80px;overflow:auto}
.processing{animation:pulse 1s infinite}
@keyframes pulse{0%{opacity:.5}50%{opacity:1}100%{opacity:.5}}
.bar{width:100%;height:12px;background:#0f172a;border-radius:999px;overflow:hidden}
.fill{height:100%;width:96%;background:#00ffff;box-shadow:0 0 15px #00ffff}
</style>
</head>
<body>
<div class="bg-anim"><div class="ball"></div><div class="ball"></div></div>

<div class="card">
<div class="title text-center">HACKII 20K</div>
<div class="sub text-center mb-6">SHA-256 RNG ENGINE</div>

<div id="timer" class="timer text-center">60</div>

<div class="digits">
<div id="d1" class="digit">0</div>
<div id="d2" class="digit">0</div>
</div>

<div id="bs" class="bigsmall text-center text-white">WAIT</div>
<div id="status" class="status text-center">INITIALIZING</div>

<div style="margin-top:20px">
<div class="flex justify-between text-xs text-cyan-300 mb-2">
<span>ENTROPY LEVEL</span>
<span id="entropyText">96%</span>
</div>
<div class="bar"><div id="entropyFill" class="fill"></div></div>
</div>

<div class="history">
<div style="color:#00ffff;font-weight:700;margin-bottom:8px">LAST RESULTS</div>
<div id="historyData">Waiting...</div>
</div>
</div>

<script>
const d1=document.getElementById("d1");
const d2=document.getElementById("d2");
const timer=document.getElementById("timer");
const bs=document.getElementById("bs");
const status=document.getElementById("status");
const historyData=document.getElementById("historyData");
const entropyFill=document.getElementById("entropyFill");
const entropyText=document.getElementById("entropyText");

let currentRound=-1;
const history=[];

async function shaRandom(min,max){
 const seed=Date.now().toString()+performance.now().toString()+crypto.randomUUID();
 const data=new TextEncoder().encode(seed);
 const hash=await crypto.subtle.digest("SHA-256",data);
 const arr=Array.from(new Uint8Array(hash));
 let num=0;
 for(let i=0;i<4;i++) num=(num<<8)|arr[i];
 return min+(Math.abs(num)%(max-min+1));
}

async function updateEntropy(){
 const value=await shaRandom(90,100);
 entropyFill.style.width=value+"%";
 entropyText.innerText=value+"%";
}

function addHistory(v){
 history.unshift(v);
 if(history.length>10) history.pop();
 historyData.innerHTML=history.join(" • ");
}

async function generateResult(){
 const big=(await shaRandom(0,1))===1;
 let n1,n2;
 if(big){
   n1=await shaRandom(5,9);
   n2=await shaRandom(5,9);
 }else{
   n1=await shaRandom(0,4);
   n2=await shaRandom(0,4);
 }
 d1.innerText=n1;
 d2.innerText=n2;
 bs.innerText=big?"BIG":"SMALL";
 bs.className=big?"bigsmall text-center text-red-500":"bigsmall text-center text-blue-400";
 status.innerText="RESULT LOCKED";
 status.className="status text-center text-green-400";
 addHistory(`${n1}${n2} - ${big?"BIG":"SMALL"}`);
 updateEntropy();
}

async function shuffleAnimation(){
 d1.innerText=await shaRandom(0,9);
 d2.innerText=await shaRandom(0,9);
 bs.innerText="PROCESSING";
 status.innerText="ANALYZING SHA-256";
 status.className="status text-center processing";
}

async function engine(){
 const sec=new Date().getSeconds();
 const remain=60-sec;
 timer.innerText=remain;
 const round=Math.floor(Date.now()/60000);

 if(remain<=10){
   await shuffleAnimation();
   currentRound=round;
 }else{
   if(currentRound!==round){
      await generateResult();
      currentRound=round;
   }
 }
}

generateResult();
setInterval(engine,300);
setInterval(updateEntropy,1000);
</script>
</body>
</html>
