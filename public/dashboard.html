<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACKII 20K QUANTUM ENGINE</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:radial-gradient(circle at top,#10182d,#03040a);
    min-height:100vh;
    overflow:hidden;
}

.glow{
    box-shadow:
    0 0 20px rgba(0,255,255,.4),
    0 0 50px rgba(0,255,255,.15);
}

.card{
    background:rgba(255,255,255,.04);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.08);
}

.digit{
    text-shadow:0 0 25px currentColor;
}

.processing{
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{opacity:.5}
    50%{opacity:1}
    100%{opacity:.5}
}
</style>
</head>

<body class="flex items-center justify-center">

<div class="card glow w-[95%] max-w-md rounded-[35px] p-8 text-center">

    <h1 class="text-4xl font-black text-cyan-400 mb-2">
        HACKII 20K
    </h1>

    <p class="text-gray-400 text-sm mb-6">
        QUANTUM RNG ENGINE
    </p>

    <div id="timer"
    class="text-6xl font-black text-yellow-400 mb-8">
        60
    </div>

    <div class="flex justify-center gap-8 mb-6">

        <div id="d1"
        class="digit text-8xl font-black text-green-400">
            0
        </div>

        <div id="d2"
        class="digit text-8xl font-black text-green-400">
            0
        </div>

    </div>

    <div id="bs"
    class="text-4xl font-black mb-6 text-white">
        WAIT
    </div>

    <div id="status"
    class="bg-slate-800 rounded-full py-3 text-sm font-bold tracking-widest">
        INITIALIZING
    </div>

</div>

<script>

const d1 = document.getElementById("d1");
const d2 = document.getElementById("d2");
const timer = document.getElementById("timer");
const bs = document.getElementById("bs");
const status = document.getElementById("status");

let currentRound = -1;

function secureRandom(min,max){

    const arr = new Uint32Array(1);
    crypto.getRandomValues(arr);

    return min + (arr[0] % (max-min+1));
}

function generateResult(){

    const big = secureRandom(0,1)===1;

    let n1,n2;

    if(big){
        n1 = secureRandom(5,9);
        n2 = secureRandom(5,9);
    }else{
        n1 = secureRandom(0,4);
        n2 = secureRandom(0,4);
    }

    d1.innerText = n1;
    d2.innerText = n2;

    bs.innerText = big ? "BIG" : "SMALL";

    bs.className =
    big
    ? "text-4xl font-black mb-6 text-red-500"
    : "text-4xl font-black mb-6 text-blue-400";

    status.innerText = "RESULT LOCKED";
    status.className =
    "bg-green-900 rounded-full py-3 text-sm font-bold tracking-widest text-green-400";
}

function shuffleAnimation(){

    d1.innerText = secureRandom(0,9);
    d2.innerText = secureRandom(0,9);

    bs.innerText = "PROCESSING";

    status.innerText = "SEARCHING...";
    status.className =
    "processing bg-slate-800 rounded-full py-3 text-sm font-bold tracking-widest";
}

function engine(){

    const now = new Date();

    const seconds = now.getSeconds();

    const remaining = 60 - seconds;

    timer.innerText = remaining;

    const round = Math.floor(Date.now()/60000);

    if(remaining <= 10){

        shuffleAnimation();

        currentRound = round;

    }else{

        if(currentRound !== round){

            generateResult();

            currentRound = round;
        }
    }
}

engine();

setInterval(engine,100);

</script>

</body>
</html>
