<!DOCTYPE html>  <html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>⚙️ HACKII SERVER CONTROL ROOM</title>  
    <script src="https://cdn.tailwindcss.com"></script>  
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">  
    <style>  
        body { font-family: 'Space Grotesk', sans-serif; background-color: #030614; }  
        .font-digital { font-family: 'Orbitron', sans-serif; }  
        .premium-card { background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(147, 51, 234, 0.25); }  
    </style>  
</head>  
<body class="text-slate-100 min-h-screen p-5 flex flex-col items-center">  <script>  
    if(sessionStorage.getItem('ADM_AUTH_SESSION') !== 'ACTIVE') { window.location.href = "index.html"; }  
</script>  

<div class="w-full max-w-lg mt-2 flex flex-col gap-5 h-[92vh]">  
    <div class="flex justify-between items-center border-b border-purple-900/60 pb-3">  
        <div>  
            <h1 class="text-xl font-black text-purple-400 font-digital uppercase tracking-wide">SERVER CONTROL NODE</h1>  
            <p class="text-[9px] text-slate-500 font-mono tracking-widest">LIVE DATA SYNCHRONIZATION RUNNING</p>  
        </div>  
        <button onclick="exitTerminal()" class="bg-rose-950/80 border border-rose-800/50 text-rose-400 px-3 py-1 rounded text-xs font-mono font-bold">CLOSE DESK</button>  
    </div>  

    <div class="premium-card p-4 rounded-2xl shadow-xl">  
        <h2 class="text-[10px] font-bold text-slate-400 font-mono tracking-widest uppercase mb-2">FORCE MANUALLY APPROVE NEW UID</h2>  
        <div class="flex gap-2">  
            <input type="text" id="manual-uid" placeholder="ENTER MEMBER UID..." class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 font-digital text-cyan-400 text-center tracking-widest text-sm focus:outline-none uppercase">  
            <button onclick="addNode()" class="bg-purple-600 hover:bg-purple-500 text-slate-950 font-bold px-5 rounded-xl font-mono text-xs uppercase">GRANT</button>  
            <button onclick="addNoRecharge()" class="bg-cyan-600 hover:bg-cyan-500 text-slate-950 font-bold px-5 rounded-xl font-mono text-xs uppercase">NO RECHARGE</button>  
        </div>  
    </div>  

    <div class="premium-card p-4 rounded-2xl flex-1 flex flex-col overflow-hidden">  
        <div class="flex justify-between items-center mb-3 border-b border-slate-900 pb-2">  
            <span class="text-[10px] font-bold text-slate-400 font-mono uppercase tracking-wider">LIVE DATA QUEUE STREAM:</span>  
            <button onclick="clearAll()" class="text-[9px] text-rose-500 hover:underline font-mono uppercase font-bold">WIPE STACK</button>  
        </div>  
        <div id="queue-box" class="flex flex-col gap-2 overflow-y-auto pr-1 flex-1"></div>  
    </div>  
</div>  

<script>  
    function fetchQueue() {  
        fetch('/api/admin/fetch-records')  
            .then(res => res.json())  
            .then(data => renderUi(data))  
            .catch(err => console.error(err));  
    }  

    function updateState(uid, action) {  
        fetch('/api/admin/modify-state', {  
            method: 'POST',  
            headers: { 'Content-Type': 'application/json' },  
            body: JSON.stringify({ uid, action })  
        })  
        .then(res => res.json())  
        .then(data => renderUi(data.payload));  
    }  

    function addNode() {  
        const input = document.getElementById('manual-uid');  
        const uid = input.value.trim().toUpperCase();  
        if(!uid) return;  
        updateState(uid, 'ALLOW');  
        input.value = "";  
    }  

    function addNoRecharge() {  
        const input = document.getElementById('manual-uid');  
        const uid = input.value.trim().toUpperCase();  
        if(!uid) return;  
        updateState(uid, 'NO_RECHARGE');  
        input.value = "";  
    }  

    function clearAll() {  
        fetch('/api/admin/clear-all', { method: 'POST' })  
        .then(res => res.json())  
        .then(data => renderUi(data.payload));  
    }  

    function renderUi(db) {  
        const box = document.getElementById('queue-box');  
        box.innerHTML = "";  

        (db.PENDING_REQUESTS || []).forEach(uid => {  
            createRow(box, uid, `  
                <div class="flex gap-1.5">  
                    <button onclick="updateState('${uid}','ALLOW')" class="bg-emerald-500/20 px-2 py-0.5 rounded text-[10px]">ALLOW</button>  
                    <button onclick="updateState('${uid}','BAN')" class="bg-rose-500/20 px-2 py-0.5 rounded text-[10px]">BAN</button>  
                    <button onclick="updateState('${uid}','NO_RECHARGE')" class="bg-cyan-500/20 px-2 py-0.5 rounded text-[10px]">NO RECHARGE</button>  
                </div>  
            `);  
        });  

        Object.keys(db.APPROVED_UID_REGISTRY || {}).forEach(uid => {  
            createRow(box, uid, `<span class="text-emerald-400 font-bold text-[10px]">APPROVED</span>`);  
        });  

        Object.keys(db.NO_RECHARGE_REGISTRY || {}).forEach(uid => {  
            createRow(box, uid, `<span class="text-cyan-400 font-bold text-[10px]">NO RECHARGE</span>`);  
        });  

        Object.keys(db.BANNED_REGISTRY || {}).forEach(uid => {  
            createRow(box, uid, `<span class="text-rose-500 font-bold text-[10px]">BANNED</span>`);  
        });  
    }  

    function createRow(parent, uid, html) {  
        const row = document.createElement('div');  
        row.className = "flex justify-between items-center bg-slate-950 p-3 rounded-xl border border-slate-900 text-xs font-mono";  
        row.innerHTML = `<span class="text-cyan-400">${uid}</span>${html}`;  
        parent.appendChild(row);  
    }  

    function exitTerminal() {  
        sessionStorage.removeItem('ADM_AUTH_SESSION');  
        location.href = "index.html";  
    }  

    window.onload = fetchQueue;  
</script>

</body>  
</html>
