<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ HACKII PANEL CORE v9.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #030610; overflow: hidden; }
        .font-digital { font-family: 'Orbitron', sans-serif; }
        
        .cyber-glow {
            background: linear-gradient(90deg, #ff0055, #7000ff, #00f0ff, #ff0055);
            background-size: 200% auto;
            animation: moveShimmer 4s linear infinite;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        @keyframes moveShimmer { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        
        .premium-card { background: rgba(10, 17, 38, 0.8); backdrop-filter: blur(25px); border: 1px solid rgba(139, 92, 246, 0.25); box-shadow: 0 0 40px rgba(112,0,255,0.12); }
        
        /* Verify ID Premium Blue Glow */
        .verify-premium-btn {
            background: linear-gradient(135deg, #0088cc, #00a8ff);
            box-shadow: 0 4px 20px rgba(0, 136, 204, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .verify-premium-btn:hover {
            box-shadow: 0 6px 30px rgba(0, 136, 204, 0.7);
            transform: translateY(-2px);
        }

        /* Register Premium Orange Glow */
        .reg-premium-btn {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 4px 20px rgba(217, 119, 6, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .reg-premium-btn:hover {
            box-shadow: 0 6px 30px rgba(217, 119, 6, 0.7);
            transform: translateY(-2px);
        }

        #toast-layer { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateY(150%) translateX(-50%); }
        #toast-layer.active { transform: translateY(0) translateX(-50%); }
    </style>
</head>
<body class="text-slate-200 h-screen w-screen flex flex-col justify-between p-6 select-none relative">

    <div class="absolute inset-0 bg-[linear-gradient(to_right,rgba(255,255,255,0.01)_1px,transparent_1px),linear-gradient(to_bottom,rgba(255,255,255,0.01)_1px,transparent_1px)] bg-[size:30px_30px] z-0"></div>

    <header class="w-full flex justify-between items-center z-10 shrink-0">
        <span class="text-[10px] font-mono tracking-[0.3em] text-cyan-500 uppercase">SYS_NODE_v9.5_LIVE</span>
        <div class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></div>
    </header>

    <main class="w-full max-w-md mx-auto z-10 flex flex-col gap-5 my-auto">
        
        <div class="text-center mb-2">
            <h1 class="text-4xl font-black font-digital tracking-tight uppercase cyber-glow">HACKII PANEL 100K</h1>
            <p class="text-[11px] text-cyan-400 font-mono tracking-[0.4em] uppercase mt-1">HIGH PERFORMANCE INTERFACE</p>
        </div>

        <div class="w-full premium-card p-6 rounded-3xl relative overflow-hidden flex flex-col gap-4">
            
            <div>
                <label class="block text-[10px] font-bold text-slate-400 font-mono tracking-widest uppercase mb-2 text-center">ENTER SYSTEM UNIQUE ID (UID):</label>
                <input type="text" id="node-uid-input" placeholder="ENTER UID..." 
                    class="w-full bg-slate-950 border border-slate-800/80 rounded-xl px-4 py-3.5 text-center font-digital text-xl tracking-widest text-cyan-400 focus:outline-none focus:border-cyan-500/50 uppercase">
            </div>
            
            <button onclick="executeSecureLogin()" 
                class="w-full bg-gradient-to-r from-purple-600 to-cyan-500 hover:from-purple-500 hover:to-cyan-400 text-slate-950 font-black tracking-[0.25em] uppercase py-4 rounded-xl font-mono text-sm shadow-lg transition-transform active:scale-95">
                START
            </button>

            <div class="text-center text-xs bg-rose-950/30 border border-rose-900/60 text-rose-400 font-black py-2.5 rounded-xl tracking-wider uppercase font-mono shadow-inner">
                ⚠️ ONLY NEW YAARWIN GAME ID ALLOWED
            </div>
        </div>

        <div class="w-full flex flex-col gap-3">
            <a href="https://4yaarwin.com/#/register?invitationCode=18426755757" target="_blank" 
                class="reg-premium-btn w-full text-center text-slate-950 font-black text-sm tracking-widest uppercase py-4 rounded-2xl font-mono flex items-center justify-center gap-2">
                🔗 REGISTER GAME ACCOUNT
            </a>

            <a href="https://t.me/hackii_sureshote" target="_blank" 
                class="verify-premium-btn w-full text-center text-white font-black text-sm tracking-widest uppercase py-4 rounded-2xl font-mono flex items-center justify-center gap-2">
                👑 VERIFY ID
            </a>
        </div>

    </main>

    <footer class="w-full text-center text-[9px] text-slate-700 font-mono tracking-widest uppercase z-10 shrink-0">
        ENCRYPTED SECURITY LAYER ACTIVE
    </footer>

    <div id="toast-layer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 premium-card px-5 py-3 rounded-xl text-xs font-mono text-cyan-300 flex items-center gap-2 max-w-[90vw]">
        <span id="toast-msg">SYSTEM LOG: ENGINE READY</span>
    </div>

    <script>
        const ADM_TOKEN = "HACKII@786";

        function loadSystemDB() {
            let db = localStorage.getItem('HACKII_GLOBAL_STORE');
            if(!db) {
                db = {
                    "APPROVED_UID_REGISTRY": { "9999": "APPROVED", "8888": "APPROVED" },
                    "PENDING_REQUESTS": [],
                    "BANNED_REGISTRY": {}
                };
                localStorage.setItem('HACKII_GLOBAL_STORE', JSON.stringify(db));
            }
            return JSON.parse(localStorage.getItem('HACKII_GLOBAL_STORE'));
        }
        
        function saveSystemDB(data) {
            localStorage.setItem('HACKII_GLOBAL_STORE', JSON.stringify(data));
        }

        function executeSecureLogin() {
            const input = document.getElementById('node-uid-input');
            const val = input ? input.value.trim().toUpperCase() : "";

            if(!val) { displayToast("⚠️ FIELD VALUE PARAMETER EMPTY!"); return; }

            if(val === ADM_TOKEN) {
                displayToast("🔑 ROOT LEVEL HANDSHAKE SUCCESS... ACCESSED.");
                sessionStorage.setItem('ADM_AUTH_SESSION', 'ACTIVE');
                setTimeout(() => { window.location.href = "admin.html"; }, 800);
                return;
            }

            let db = loadSystemDB();

            if (db.BANNED_REGISTRY[val]) {
                displayToast("❌ DENIED: Hardware node blacklisted.");
                return;
            }
            
            if (db.APPROVED_UID_REGISTRY[val]) {
                displayToast("✅ HARDWARE TOKEN VERIFIED! INJECTING...");
                localStorage.setItem('USER_VALID_SESSION_UID', val);
                setTimeout(() => { window.location.href = "dashboard.html"; }, 800);
                return;
            }

            if (!db.PENDING_REQUESTS.includes(val)) {
                db.PENDING_REQUESTS.push(val);
                saveSystemDB(db);
            }
            displayToast("⏳ APPLIED KEY LOGGED! WAIT FOR ADMIN APPROVAL.");
        }

        let tOut;
        function displayToast(msg) {
            const box = document.getElementById('toast-layer');
            const txt = document.getElementById('toast-msg');
            if(!box || !txt) return;
            txt.innerText = msg;
            box.classList.add('active');
            clearTimeout(tOut);
            tOut = setTimeout(() => box.classList.remove('active'), 3000);
        }

        window.onload = loadSystemDB;
    </script>
</body>
</html>
